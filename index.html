<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>我的作品集</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    /* 顶部导航 */
    .nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 50px;
      background: rgba(0,0,0,0.2);
      position: sticky;
      top: 0;
    }

    .nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
    }

    /* Hero区域 */
    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h1 {
      font-size: 50px;
    }

    .hero p {
      margin-top: 10px;
      opacity: 0.8;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: white;
      color: #333;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
    }

    /* 项目区 */
    .projects {
      padding: 50px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    /* 页脚 */
    footer {
      text-align: center;
      padding: 20px;
      opacity: 0.7;
    }

  </style>
</head>

<body>

  <!-- 导航 -->
  <div class="nav">
    <div>🔥 我的作品集</div>
    <div>
      <a href="#">Home</a>
      <a href="#projects">Projects</a>
    </div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <h1>你好，我是开发者 👋</h1>
    <p>这是我的第一个作品集网站</p>
    <button class="btn" onclick="document.getElementById('projects').scrollIntoView()">
      查看项目
    </button>
  </div>

  <!-- Projects -->
  <div class="projects" id="projects">
    <h2>我的项目</h2>

    <div class="grid">
      <div class="card">
        <h3>项目一</h3>
        <p>这是一个很酷的网页</p>
      </div>

      <div class="card">
        <h3>项目二</h3>
        <p>这是一个小应用</p>
      </div>

      <div class="card">
        <h3>项目三</h3>
        <p>这是我的练习作品</p>
      </div>
    </div>
  </div>

  <!-- footer -->
  <footer>
    © 2026 我的作品集
  </footer>

</body>
</html>
